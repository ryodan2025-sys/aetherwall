<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; }
  body { background:#000; overflow:hidden; width:100vw; height:100vh; cursor:crosshair; }
  canvas { display:block; }
  #info {
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
    color:rgba(255,255,255,.25); font:11px -apple-system,sans-serif;
    letter-spacing:2px; text-transform:uppercase; pointer-events:none;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">Fareyi hareket ettir · Tıkla: kara delik · Çift tıkla: büyük patlama</div>

<script>
'use strict';

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;

let mouseX = W/2, mouseY = H/2;
let mouseNX = 0.5, mouseNY = 0.5; // normalize [0,1]
let time = 0;
let blackHoles = [];
let explosions = [];

// ── Yıldız sistemi ────────────────────────────────────────────────────────────
const STAR_COUNT = 2000;

class Star {
  constructor(deep = false) {
    this.reset(deep);
  }
  reset(deep = false) {
    // 3D sphère koordinatı
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = deep ? 800 + Math.random() * 400 : 100 + Math.random() * 700;

    this.ox = Math.sin(phi) * Math.cos(theta) * r;
    this.oy = Math.sin(phi) * Math.sin(theta) * r;
    this.oz = Math.cos(phi) * r;

    this.x = this.ox;
    this.y = this.oy;
    this.z = this.oz;

    this.size  = Math.random() * 2.5;
    this.hue   = Math.random() < 0.3 ? 200 + Math.random() * 60 :  // Mavi-beyaz
                 Math.random() < 0.5 ? 30  + Math.random() * 20  :  // Sarı-turuncu
                 0;                                                    // Kırmızı
    this.bri   = 60 + Math.random() * 40;
    this.twinkleSpeed = 0.03 + Math.random() * 0.05;
    this.twinklePhase = Math.random() * Math.PI * 2;
    this.trail = []; // hareket izi
    this.speed = 0.002 + Math.random() * 0.003;
    this.arm   = Math.random() < 0.6; // galaksi kolu mu?
    this.armAngle = Math.random() * Math.PI * 2;
  }

  update(dt) {
    // Perspektif projeksiyon + mouse parallax
    const parallaxX = (mouseNX - 0.5) * 200;
    const parallaxY = (mouseNY - 0.5) * 200;

    // Galaksi dönüşü
    const cosR = Math.cos(this.speed * dt * 0.01);
    const sinR = Math.sin(this.speed * dt * 0.01);
    const nx   = this.x * cosR - this.y * sinR;
    const ny   = this.x * sinR + this.y * cosR;
    this.x = nx; this.y = ny;

    // Kara delik çekimi
    blackHoles.forEach(bh => {
      const dx = bh.x - this.x;
      const dy = bh.y - this.y;
      const dz = bh.z - this.z;
      const d  = Math.sqrt(dx*dx + dy*dy + dz*dz);
      if (d < bh.r * 50) {
        this.x += dx/d * bh.pull;
        this.y += dy/d * bh.pull;
        this.z += dz/d * bh.pull;
      }
    });

    // Projeksiyon
    const focal = 600;
    const px = this.x + parallaxX;
    const py = this.y + parallaxY;
    const pz = this.z + 600;
    if (pz <= 0) { this.reset(); return; }

    this.sx = (px / pz) * focal + W/2;
    this.sy = (py / pz) * focal + H/2;
    this.sr = Math.max(0.2, (this.size * focal) / pz);
    this.depth = pz;

    // İz kaydet
    if (this.trail.length < 3) this.trail.push({x: this.sx, y: this.sy});
    else { this.trail.shift(); this.trail.push({x: this.sx, y: this.sy}); }
  }

  draw() {
    if (!this.sx || this.sx < -10 || this.sx > W+10 || this.sy < -10 || this.sy > H+10) return;

    const twinkle = 0.6 + Math.sin(time * this.twinkleSpeed + this.twinklePhase) * 0.4;
    const alpha   = twinkle * Math.min(1, 1200 / this.depth);

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.shadowColor = `hsl(${this.hue},80%,${this.bri}%)`;
    ctx.shadowBlur  = this.sr * 4;
    ctx.fillStyle   = `hsl(${this.hue},80%,${this.bri}%)`;
    ctx.beginPath();
    ctx.arc(this.sx, this.sy, this.sr, 0, Math.PI*2);
    ctx.fill();

    // Büyük yıldızlara haç şekli
    if (this.sr > 1.5) {
      ctx.strokeStyle = `hsl(${this.hue},80%,${this.bri}%)`;
      ctx.lineWidth   = 0.3;
      ctx.globalAlpha = alpha * 0.4;
      const len = this.sr * 4;
      ctx.beginPath();
      ctx.moveTo(this.sx - len, this.sy); ctx.lineTo(this.sx + len, this.sy);
      ctx.moveTo(this.sx, this.sy - len); ctx.lineTo(this.sx, this.sy + len);
      ctx.stroke();
    }
    ctx.restore();
  }
}

const stars = Array.from({length: STAR_COUNT}, (_, i) => new Star(i > STAR_COUNT*0.7));

// ── Kara Delik ────────────────────────────────────────────────────────────────
class BlackHole {
  constructor(x, y) {
    this.x = (x - W/2) * 0.5; this.y = (y - H/2) * 0.5; this.z = 100;
    this.r    = 30;
    this.pull = 2;
    this.life = 300;
    this.maxLife = 300;
    this.accDisk = 0;
  }
  update() {
    this.life--;
    this.accDisk += 0.05;
  }
  draw() {
    const focal = 600;
    const sx    = (this.x / (this.z + 600)) * focal + W/2;
    const sy    = (this.y / (this.z + 600)) * focal + H/2;
    const alpha = this.life / this.maxLife;

    ctx.save();
    ctx.globalAlpha = alpha;

    // Çekim diski
    for (let i = 0; i < 3; i++) {
      const gr = ctx.createRadialGradient(sx, sy, 5, sx, sy, 60 + i*20);
      gr.addColorStop(0, `hsla(${30+i*20},100%,60%,0.4)`);
      gr.addColorStop(0.5, `hsla(${200+i*30},100%,50%,0.15)`);
      gr.addColorStop(1, 'transparent');
      ctx.fillStyle = gr;
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(this.accDisk + i * Math.PI/3);
      ctx.scale(1, 0.3);
      ctx.translate(-sx, -sy);
      ctx.beginPath(); ctx.arc(sx, sy, 60 + i*20, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // Merkez siyah nokta
    ctx.shadowColor = 'rgba(0,0,0,1)';
    ctx.shadowBlur  = 20;
    ctx.fillStyle   = '#000';
    ctx.beginPath(); ctx.arc(sx, sy, 12, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
}

// ── Patlama ───────────────────────────────────────────────────────────────────
class Explosion {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.particles = Array.from({length:200}, () => {
      const angle = Math.random() * Math.PI*2;
      const spd   = 2 + Math.random() * 8;
      return {
        x: x, y: y,
        vx: Math.cos(angle)*spd, vy: Math.sin(angle)*spd,
        life: 1, decay: 0.01 + Math.random()*0.02,
        r: 1 + Math.random()*3,
        hue: Math.random()*60 + 10
      };
    });
  }
  update() {
    this.particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.vx *= 0.97; p.vy *= 0.97;
      p.life -= p.decay;
    });
    this.particles = this.particles.filter(p => p.life > 0);
  }
  draw() {
    this.particles.forEach(p => {
      ctx.save();
      ctx.globalAlpha = p.life;
      ctx.shadowColor = `hsl(${p.hue},100%,60%)`;
      ctx.shadowBlur  = p.r * 3;
      ctx.fillStyle   = `hsl(${p.hue},100%,70%)`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    });
  }
  get dead() { return !this.particles.length; }
}

// ── Nebula ────────────────────────────────────────────────────────────────────
function drawNebula() {
  const nebs = [
    { x: W*0.3, y: H*0.4, r: 300, hue: 250, opa: 0.04 },
    { x: W*0.7, y: H*0.6, r: 250, hue: 200, opa: 0.03 },
    { x: W*0.5, y: H*0.3, r: 200, hue: 320, opa: 0.04 },
  ];
  nebs.forEach(n => {
    const ox = (mouseNX - 0.5) * 30;
    const oy = (mouseNY - 0.5) * 30;
    const g  = ctx.createRadialGradient(n.x+ox, n.y+oy, 0, n.x+ox, n.y+oy, n.r);
    g.addColorStop(0, `hsla(${n.hue + time*0.5},80%,40%,${n.opa})`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  });
}

// ── Ana döngü ─────────────────────────────────────────────────────────────────
function loop() {
  requestAnimationFrame(loop);
  time++;

  // Fade
  ctx.fillStyle = 'rgba(0,0,6,0.2)';
  ctx.fillRect(0, 0, W, H);

  drawNebula();

  // Yıldızları güncelle ve çiz
  stars.forEach(s => { s.update(time); s.draw(); });

  // Kara delikler
  blackHoles = blackHoles.filter(bh => bh.life > 0);
  blackHoles.forEach(bh => { bh.update(); bh.draw(); });

  // Patlamalar
  explosions = explosions.filter(e => !e.dead);
  explosions.forEach(e => { e.update(); e.draw(); });

  // Galaksi merkezi parıltı
  const cx = W/2 + (mouseNX-0.5)*-50;
  const cy = H/2 + (mouseNY-0.5)*-50;
  const glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, 150);
  glow.addColorStop(0, `rgba(200,180,255,${0.06 + Math.sin(time*0.02)*0.02})`);
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);
}

// ── Eventler ─────────────────────────────────────────────────────────────────
window.addEventListener('mousemove', e => {
  mouseX  = e.clientX; mouseY  = e.clientY;
  mouseNX = e.clientX / W; mouseNY = e.clientY / H;
});

window.addEventListener('click', e => {
  blackHoles.push(new BlackHole(e.clientX, e.clientY));
  setTimeout(() => blackHoles.shift(), 6000);
});

window.addEventListener('dblclick', e => {
  explosions.push(new Explosion(e.clientX, e.clientY));
  // Yeni yıldız kümesi doğur
  for (let i = 0; i < 50; i++) {
    const s = new Star();
    s.x = (e.clientX - W/2) + (Math.random()-0.5)*100;
    s.y = (e.clientY - H/2) + (Math.random()-0.5)*100;
    s.z = 300;
    stars.push(s);
    if (stars.length > STAR_COUNT + 200) stars.shift();
  }
});

window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

loop();
</script>
</body>
</html>
