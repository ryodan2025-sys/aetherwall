<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AetherWall</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
  }

  canvas {
    position: fixed;
    inset: 0;
    display: block;
  }

  /* ── Üst katman UI ── */
  .overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }

  /* Logo */
  .logo-wrap {
    text-align: center;
    opacity: 0;
    transform: scale(0.6);
    animation: logoReveal 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.8s forwards;
  }

  .logo-title {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: clamp(32px, 6vw, 72px);
    letter-spacing: 0.25em;
    color: #fff;
    text-shadow:
      0 0 20px rgba(180,160,255,0.9),
      0 0 60px rgba(120,90,255,0.6),
      0 0 120px rgba(80,60,220,0.4);
    line-height: 1;
  }

  .logo-sub {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(11px, 1.8vw, 16px);
    letter-spacing: 0.55em;
    color: rgba(200,190,255,0.65);
    text-transform: uppercase;
    margin-top: 10px;
  }

  /* Yatay çizgi */
  .divider {
    width: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(160,130,255,0.8), transparent);
    margin: 28px auto;
    animation: dividerExpand 0.9s ease-out 1.6s forwards;
  }

  /* İlerleme çubuğu */
  .progress-wrap {
    width: clamp(200px, 30vw, 380px);
    opacity: 0;
    animation: fadeUp 0.6s ease 2.0s forwards;
  }

  .progress-bar-bg {
    width: 100%;
    height: 2px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
    overflow: hidden;
    position: relative;
  }

  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #6040ff, #a070ff, #c090ff);
    border-radius: 2px;
    box-shadow: 0 0 10px rgba(150,100,255,0.8);
    animation: progressFill 2.8s cubic-bezier(0.4, 0, 0.2, 1) 2.1s forwards;
  }

  /* Scan line efekti */
  .progress-bar-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
    width: 60%;
    animation: scanLine 1.5s linear 2.1s infinite;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    margin-top: 10px;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: rgba(180,160,255,0.5);
    text-transform: uppercase;
  }

  .progress-pct {
    color: rgba(200,185,255,0.75);
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    counter-reset: pct 0;
    animation: countUp 2.8s ease 2.1s forwards;
  }

  /* Köşe dekorasyon */
  .corner {
    position: fixed;
    width: 40px;
    height: 40px;
    opacity: 0;
    animation: fadeIn 0.5s ease 2.4s forwards;
  }
  .corner::before,
  .corner::after {
    content: '';
    position: absolute;
    background: rgba(160,130,255,0.5);
  }
  .corner::before { width: 100%; height: 1px; }
  .corner::after  { width: 1px; height: 100%; }

  .corner-tl { top: 24px; left: 24px; }
  .corner-tl::before { top: 0; left: 0; }
  .corner-tl::after  { top: 0; left: 0; }

  .corner-tr { top: 24px; right: 24px; transform: scaleX(-1); }
  .corner-tr::before { top: 0; left: 0; }
  .corner-tr::after  { top: 0; left: 0; }

  .corner-bl { bottom: 24px; left: 24px; transform: scaleY(-1); }
  .corner-bl::before { top: 0; left: 0; }
  .corner-bl::after  { top: 0; left: 0; }

  .corner-br { bottom: 24px; right: 24px; transform: scale(-1,-1); }
  .corner-br::before { top: 0; left: 0; }
  .corner-br::after  { top: 0; left: 0; }

  /* Vignette */
  .vignette {
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center,
      transparent 30%,
      rgba(0,0,5,0.6) 70%,
      rgba(0,0,10,0.92) 100%);
    pointer-events: none;
    z-index: 5;
  }

  /* Tüm ekran flash ve geçiş */
  .flash {
    position: fixed;
    inset: 0;
    background: #fff;
    opacity: 0;
    pointer-events: none;
    z-index: 100;
    animation: flashOut 0.6s ease 5.2s forwards;
  }

  /* ── Keyframes ── */
  @keyframes logoReveal {
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes dividerExpand {
    to { width: clamp(200px, 30vw, 380px); }
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes progressFill {
    0%   { width: 0%; }
    15%  { width: 18%; }
    40%  { width: 45%; }
    70%  { width: 72%; }
    88%  { width: 89%; }
    100% { width: 100%; }
  }
  @keyframes scanLine {
    from { transform: translateX(-100%); }
    to   { transform: translateX(200%); }
  }
  @keyframes fadeIn {
    to { opacity: 1; }
  }
  @keyframes flashOut {
    0%   { opacity: 0.9; }
    100% { opacity: 0; }
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="vignette"></div>

<div class="overlay">
  <div class="logo-wrap">
    <div class="logo-title">AETHERWALL</div>
    <div class="logo-sub">Live Wallpaper Engine</div>
  </div>

  <div class="divider"></div>

  <div class="progress-wrap">
    <div class="progress-bar-bg">
      <div class="progress-bar-fill"></div>
    </div>
    <div class="progress-label">
      <span>Başlatılıyor</span>
      <span class="progress-pct" id="pct">0%</span>
    </div>
  </div>
</div>

<!-- Köşe süsler -->
<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="flash"></div>

<script>
'use strict';

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ── Ekran boyutu ──────────────────────────────────────────────────────────────
let W, H, cx, cy;
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W / 2;
  cy = H / 2;
}
window.addEventListener('resize', resize);
resize();

// ── Yıldız sistemi ────────────────────────────────────────────────────────────
const NUM_STARS = 600;
const stars = [];

// Hiperspeed fazları
// 0 → idle (yıldızlar yavaş akıyor)
// 1 → warp  (hızlanıyor — Star Wars)
// 2 → ease  (yavaşlıyor)
let phase     = 0;
let warpSpeed = 0;       // 0..1 arası normalize hız
let elapsed   = 0;       // ms

const IDLE_SPEED   = 0.0008;
const WARP_START   = 1200;   // ms: warp başlangıç
const WARP_PEAK    = 3000;   // ms: max hız
const WARP_END     = 4800;   // ms: yavaşlama sonu

class Star {
  constructor(init = false) {
    this.reset(init);
  }

  reset(spread = false) {
    // Merkeze yakın rastgele nokta
    const r = spread ? Math.random() * 0.95 + 0.05 : Math.random() * 0.15 + 0.001;
    const angle = Math.random() * Math.PI * 2;
    this.x  = r * Math.cos(angle);
    this.y  = r * Math.sin(angle);
    this.z  = Math.random() * 0.98 + 0.02;     // derinlik 0..1
    this.pz = this.z;
    this.brightness = Math.random() * 0.6 + 0.4;
    this.size = Math.random() * 1.2 + 0.3;
    this.color = this._pickColor();
  }

  _pickColor() {
    const r = Math.random();
    if (r < 0.65) return '#ffffff';           // beyaz
    if (r < 0.78) return '#c8c0ff';           // mavi-beyaz
    if (r < 0.88) return '#ffe8c0';           // sarı-beyaz
    if (r < 0.94) return '#a0c8ff';           // soğuk mavi
    return '#ffc8c8';                          // kırmızımsı
  }

  update(dt) {
    this.pz = this.z;
    // Hız = idle + warp katkısı
    const speed = IDLE_SPEED + warpSpeed * 0.055;
    this.z -= speed * (dt / 16);

    if (this.z <= 0) {
      this.reset(false);
    }
  }

  draw() {
    // Ekran koordinatları (z-perspektif)
    const invZ = 1 / this.z;
    const sx  = cx + this.x * invZ * W * 0.5;
    const sy  = cy + this.y * invZ * H * 0.5;

    const prevInvZ = 1 / this.pz;
    const px  = cx + this.x * prevInvZ * W * 0.5;
    const py  = cy + this.y * prevInvZ * H * 0.5;

    // Ekran dışıysa atla
    if (sx < -10 || sx > W + 10 || sy < -10 || sy > H + 10) {
      this.reset(false);
      return;
    }

    const trailLen = Math.hypot(sx - px, sy - py);
    const size     = this.size * (1 - this.z) * 3.5;

    // Warp'ta iz çiz, normalde nokta
    const alpha = Math.min(1, this.brightness * (1 - this.z * 0.3));

    if (warpSpeed > 0.05 && trailLen > 1) {
      // İz (streak)
      const streakAlpha = Math.min(0.95, alpha * (0.4 + warpSpeed * 0.6));
      const grad = ctx.createLinearGradient(px, py, sx, sy);
      grad.addColorStop(0, 'rgba(0,0,0,0)');
      grad.addColorStop(0.3, hexToRgba(this.color, streakAlpha * 0.5));
      grad.addColorStop(1, hexToRgba(this.color, streakAlpha));

      ctx.beginPath();
      ctx.moveTo(px, py);
      ctx.lineTo(sx, sy);
      ctx.strokeStyle = grad;
      ctx.lineWidth   = Math.max(0.5, size * (0.3 + warpSpeed * 0.7));
      ctx.stroke();
    } else {
      // Nokta
      const r = Math.max(0.5, size);
      ctx.beginPath();
      ctx.arc(sx, sy, r, 0, Math.PI * 2);
      ctx.fillStyle = hexToRgba(this.color, alpha);
      ctx.fill();

      // Parıltı — parlak yıldızlara
      if (this.brightness > 0.75 && r > 0.8) {
        ctx.beginPath();
        ctx.arc(sx, sy, r * 2.5, 0, Math.PI * 2);
        ctx.fillStyle = hexToRgba(this.color, alpha * 0.12);
        ctx.fill();
      }
    }
  }
}

// Hex → rgba yardımcı
function hexToRgba(hex, a) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a.toFixed(3)})`;
}

// Yıldızları oluştur
for (let i = 0; i < NUM_STARS; i++) {
  stars.push(new Star(true));
}

// ── Merkez ışık huzme (warp) ──────────────────────────────────────────────────
function drawWarpCore() {
  if (warpSpeed < 0.01) return;

  const maxR  = Math.max(W, H) * 0.65 * warpSpeed;
  const alpha = warpSpeed * 0.18;

  const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, maxR);
  g.addColorStop(0,   `rgba(200,180,255,${(alpha * 0.9).toFixed(3)})`);
  g.addColorStop(0.15,`rgba(140,100,255,${(alpha * 0.6).toFixed(3)})`);
  g.addColorStop(0.5, `rgba(60,40,160,${(alpha * 0.25).toFixed(3)})`);
  g.addColorStop(1,   'rgba(0,0,0,0)');

  ctx.beginPath();
  ctx.arc(cx, cy, maxR, 0, Math.PI * 2);
  ctx.fillStyle = g;
  ctx.fill();
}

// ── Render döngüsü ────────────────────────────────────────────────────────────
let lastTime = performance.now();

function loop(now) {
  const dt = Math.min(now - lastTime, 50);
  lastTime  = now;
  elapsed  += dt;

  // Warp faz geçişleri
  if (elapsed < WARP_START) {
    warpSpeed = 0;
  } else if (elapsed < WARP_PEAK) {
    const t = (elapsed - WARP_START) / (WARP_PEAK - WARP_START);
    warpSpeed = easeInCubic(t);
  } else if (elapsed < WARP_END) {
    const t = (elapsed - WARP_PEAK) / (WARP_END - WARP_PEAK);
    warpSpeed = 1 - easeOutCubic(t);
  } else {
    warpSpeed = 0;
  }

  // Arka plan — hafif iz bırak (motion blur etkisi)
  const trailAlpha = 0.18 + warpSpeed * 0.22;
  ctx.fillStyle = `rgba(0,0,5,${trailAlpha.toFixed(3)})`;
  ctx.fillRect(0, 0, W, H);

  drawWarpCore();

  for (const s of stars) {
    s.update(dt);
    s.draw();
  }

  requestAnimationFrame(loop);
}

function easeInCubic(t)  { return t * t * t; }
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

requestAnimationFrame(loop);

// ── Yüzde sayacı ─────────────────────────────────────────────────────────────
const pctEl = document.getElementById('pct');
const steps = [
  { t: 2100, v: 0 }, { t: 2400, v: 18 }, { t: 2800, v: 45 },
  { t: 3300, v: 72 }, { t: 3900, v: 89 }, { t: 4800, v: 100 }
];
let stepIdx = 0;
let currentPct = 0;

function updatePct() {
  const now = performance.now() - (performance.now() - elapsed);
  // elapsed ile senkron
}

setInterval(() => {
  if (stepIdx >= steps.length) return;
  const step = steps[stepIdx];
  if (elapsed >= step.t) {
    // Yumuşak geçiş
    const target = step.v;
    const diff   = target - currentPct;
    if (Math.abs(diff) < 1) { currentPct = target; stepIdx++; }
    else { currentPct += diff * 0.25; }
    pctEl.textContent = Math.round(currentPct) + '%';
  } else if (currentPct < step.v && stepIdx > 0) {
    currentPct += 0.5;
    pctEl.textContent = Math.round(currentPct) + '%';
  }
}, 30);
</script>
</body>
</html>
